name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version_increment:
        description: Version increment type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    name: Tag and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          current="$(cat VERSION)"
          IFS=. read -r major minor patch <<< "$current"
          case "${{ github.event.inputs.version_increment }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "major=v${major}" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and move the major tag
        shell: bash
        run: |
          set -euo pipefail
          new="${{ steps.bump.outputs.new }}"
          major="${{ steps.bump.outputs.major }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v${new}"
          git tag "v${new}"
          git tag -f "$major"
          git push origin HEAD
          git push origin "v${new}"
          git push origin -f "$major"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new }}"
          name: "v${{ steps.bump.outputs.new }}"
          generate_release_notes: true
