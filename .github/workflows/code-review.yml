name: Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name == 'issue_comment' && 'comment' || 'review' }}
      cancel-in-progress: true
    steps:
      # Mint a short-lived GitHub App installation token so the action posts reviews, the check run, and
      # thread resolutions as the App rather than github-actions[bot]. continue-on-error plus the
      # "|| github.token" fallback keep reviews running as github-actions[bot] when the App is unconfigured.
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          client-id: ${{ vars.CODE_REVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}
      # TEMP: run this PR's own action code to dogfood the streaming change; revert to @v0 before merge.
      - uses: julien777z/code-review-action@claude/tender-hawking-46eyib-2
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
