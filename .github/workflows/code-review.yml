name: Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name == 'issue_comment' && 'comment' || 'review' }}
      cancel-in-progress: true
    steps:
      # Mint a short-lived GitHub App installation token used only to resolve the action's own
      # review threads (the default GITHUB_TOKEN cannot). continue-on-error so reviews still run
      # when the App secrets are absent: resolve-token is then empty and the action keeps threads open.
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          client-id: ${{ vars.CODE_REVIEW_APP_CLIENT_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}
      # TEMP: run this PR's own action code to dogfood the streaming change; revert to @v0 before merge.
      - uses: julien777z/code-review-action@claude/tender-hawking-46eyib-2
        with:
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
          resolve-token: ${{ steps.app-token.outputs.token }}
