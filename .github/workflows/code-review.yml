name: Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name == 'issue_comment' && 'comment' || 'review' }}
      cancel-in-progress: true
    steps:
      # TEMP: pin to this branch to dogfood the NO_FINDINGS marker fix; revert to @v0 before merge.
      - uses: julien777z/code-review-action@claude/no-findings-marker
        with:
          cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
          resolve-token: ${{ secrets.CODE_REVIEW_TOKEN }}
