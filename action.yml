name: Code Review Action
description: Review pull requests with Claude Code or Codex — inline severity-rated comments and an approval verdict.
author: julien777z

branding:
  icon: check-circle
  color: purple

inputs:
  github-token:
    description: Token used to read the diff and post reviews and check runs.
    default: ${{ github.token }}
  resolve-token:
    description: Token used to resolve the action's own review threads. The default GITHUB_TOKEN cannot resolve threads (GitHub rejects it with "Resource not accessible by integration"), so set this to a GitHub App installation token (or a fine-grained PAT) with pull-request write to enable auto-resolution. Empty falls back to github-token.
    required: false
    default: ""
  claude-code-oauth-token:
    description: Long-lived Claude Code subscription token generated by `claude setup-token`.
    required: false
    default: ""
  codex-auth-json:
    description: Complete Codex auth.json generated by `codex login` for ChatGPT subscription access.
    required: false
    default: ""
  review-model:
    description: Backend to use — auto, claude, or codex.
    default: auto
  claude-model:
    description: Claude Code model id for reviews and PR-summary generation.
    default: claude-opus-4-8
  codex-model:
    description: Codex model id. The runner uses high reasoning.
    default: gpt-5.6-terra
  fallback-on-usage-limit:
    description: Switch once to the other configured provider when subscription usage is exhausted.
    default: "true"
  additional-context:
    description: Extra context injected into the review prompt.
    default: ""
  approval-include:
    description: Comma-separated severities that, if open, request changes (otherwise comment only).
    default: critical
  approval-disable:
    description: Post review comments only and skip the approval verdict and check run.
    default: "false"
  pr-review-summary:
    description: Append an AI-generated summary (bullets, risk note, overview) to the PR description on open/ready events.
    default: "true"
  enforce-project-rules:
    description: Enforce the repository's own coding rules as part of the review. Each backend loads the rule files it understands from the checked-out repo. No-op when the repository defines none.
    default: "true"
  project-rules-severity:
    description: Fixed severity to report project-rule violations at (critical, high, medium, or low). Empty lets the review rate each violation itself.
    default: ""
  simplify-suggest:
    description: Also suggest code simplifications using the code-simplify skill, as optional suggestions.
    default: "false"
  simplify-suggest-severity:
    description: Severity to report simplification suggestions at (critical, high, medium, or low). Empty defaults to low.
    default: ""
  simplify-nearby-code:
    description: Extend simplification suggestions to weigh nearby and related code as review criteria.
    default: "false"
  min-severity:
    description: Lowest severity worth posting and counting — critical, high, medium, or low.
    default: low
  low-findings-cap:
    description: Maximum number of low-severity findings to post per review; the runner selects the most important lows once the review stream ends.
    default: "3"
  max-findings:
    description: Overall cap on inline comments per review (empty = uncapped).
    default: ""
  include-paths:
    description: Comma/newline-separated globs to restrict the review to.
    default: ""
  exclude-paths:
    description: Comma/newline-separated globs to skip (generated files, lockfiles, vendored code).
    default: ""
  trigger-phrase:
    description: Comment phrase that triggers a manual review.
    default: agent review
  review-drafts:
    description: Review draft pull requests.
    default: "true"
  pr-number:
    description: PR number to review on a workflow_dispatch run.
    default: ""
  review-timeout-minutes:
    description: Overall cap on the review agent's runtime in minutes. The agent streams findings incrementally, and a few minutes before the cap the runner interrupts it and asks it to immediately emit any findings it has identified but not yet reported, so a timed-out review still posts what was found. Set to 0 to disable.
    default: "15"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
    - name: Set up Node
      if: inputs.codex-auth-json != ''
      uses: actions/setup-node@v4
    - name: Install Codex CLI
      if: inputs.codex-auth-json != ''
      shell: bash
      run: npm install --global @openai/codex@0.144.1
    - name: Install dependencies
      shell: bash
      run: python -m pip install --disable-pip-version-check -r "$GITHUB_ACTION_PATH/requirements.txt"
    - name: Run code review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RESOLVE_TOKEN: ${{ inputs.resolve-token }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        CODEX_AUTH_JSON: ${{ inputs.codex-auth-json }}
        REVIEW_MODEL: ${{ inputs.review-model }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        CODEX_MODEL: ${{ inputs.codex-model }}
        FALLBACK_ON_USAGE_LIMIT: ${{ inputs.fallback-on-usage-limit }}
        ADDITIONAL_CONTEXT: ${{ inputs.additional-context }}
        APPROVAL_INCLUDE: ${{ inputs.approval-include }}
        APPROVAL_DISABLE: ${{ inputs.approval-disable }}
        PR_REVIEW_SUMMARY: ${{ inputs.pr-review-summary }}
        ENFORCE_PROJECT_RULES: ${{ inputs.enforce-project-rules }}
        PROJECT_RULES_SEVERITY: ${{ inputs.project-rules-severity }}
        SIMPLIFY_SUGGEST: ${{ inputs.simplify-suggest }}
        SIMPLIFY_SUGGEST_SEVERITY: ${{ inputs.simplify-suggest-severity }}
        SIMPLIFY_NEARBY_CODE: ${{ inputs.simplify-nearby-code }}
        MIN_SEVERITY: ${{ inputs.min-severity }}
        LOW_FINDINGS_CAP: ${{ inputs.low-findings-cap }}
        MAX_FINDINGS: ${{ inputs.max-findings }}
        INCLUDE_PATHS: ${{ inputs.include-paths }}
        EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}
        REVIEW_DRAFTS: ${{ inputs.review-drafts }}
        PR_NUMBER: ${{ inputs.pr-number }}
        REVIEW_TIMEOUT_MINUTES: ${{ inputs.review-timeout-minutes }}
      # Keep Python as the step's foreground process so Actions cancellation signals reach the
      # review cleanup handler, which concludes any in-progress Approval Verdict check.
      run: PYTHONPATH="$GITHUB_ACTION_PATH/src" exec python -m code_review
