name: Code Review Action
description: Review pull requests with Claude or Cursor — inline severity-rated comments and an approval verdict.
author: julien777z

branding:
  icon: check-circle
  color: purple

inputs:
  github-token:
    description: Token used to read the diff and post reviews and check runs.
    default: ${{ github.token }}
  resolve-token:
    description: Token used to resolve the action's own review threads. The default GITHUB_TOKEN cannot resolve threads (GitHub rejects it with "Resource not accessible by integration"), so set this to a GitHub App installation token (or a fine-grained PAT) with pull-request write to enable auto-resolution. Empty falls back to github-token.
    required: false
    default: ""
  anthropic-api-key:
    description: Anthropic API key for the Claude Messages API backend.
    required: false
    default: ""
  cursor-api-key:
    description: Cursor API key for the Cursor backend.
    required: false
    default: ""
  review-model:
    description: Backend to use — auto, claude, or cursor.
    default: auto
  first-review-model:
    description: Backend for the PR's first review (opened/ready). Empty falls back to review-model.
    default: ""
  claude-model:
    description: Anthropic model id for the Claude API backend.
    default: claude-opus-4-8
  cursor-model:
    description: Cursor model id for the Cursor backend.
    default: composer-2.5
  claude-environment-id:
    description: Managed Agents cloud environment id the Claude backend reuses to mount the repository when enforcing project rules. Empty creates and deletes a fresh environment for each run.
    required: false
    default: ""
  additional-context:
    description: Extra context injected into the review prompt.
    default: ""
  approval-include:
    description: Comma-separated severities that, if open, request changes (otherwise comment only).
    default: critical
  approval-disable:
    description: Post review comments only and skip the approval verdict and check run.
    default: "false"
  pr-review-summary:
    description: Append an AI-generated summary (bullets, risk note, overview) to the PR description on open/ready events.
    default: "true"
  enforce-project-rules:
    description: Enforce the repository's own coding rules (.claude/rules/*.md) as part of the review. No-op when the repository has none.
    default: "true"
  simplify-suggest:
    description: Also suggest code simplifications (using the code-simplify skill) as low-severity nits.
    default: "false"
  simplify-nearby-code:
    description: Extend simplification suggestions to weigh nearby and related code as review criteria, still as low-severity nits.
    default: "false"
  min-severity:
    description: Lowest severity worth posting and counting — critical, high, medium, or low.
    default: low
  low-findings-cap:
    description: Maximum number of low-severity findings to post per review.
    default: "3"
  max-findings:
    description: Overall cap on inline comments per review (empty = uncapped).
    default: ""
  include-paths:
    description: Comma/newline-separated globs to restrict the review to.
    default: ""
  exclude-paths:
    description: Comma/newline-separated globs to skip (generated files, lockfiles, vendored code).
    default: ""
  trigger-phrase:
    description: Comment phrase that triggers a manual review.
    default: agent review
  review-drafts:
    description: Review draft pull requests.
    default: "true"
  author-associations:
    description: Comma-separated allowlist of author associations allowed to trigger; empty allows all.
    default: ""
  pr-number:
    description: PR number to review on a workflow_dispatch run.
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      shell: bash
      run: python -m pip install --disable-pip-version-check -r "$GITHUB_ACTION_PATH/requirements.txt"
    - name: Run code review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RESOLVE_TOKEN: ${{ inputs.resolve-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CURSOR_API_KEY: ${{ inputs.cursor-api-key }}
        REVIEW_MODEL: ${{ inputs.review-model }}
        FIRST_REVIEW_MODEL: ${{ inputs.first-review-model }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        CURSOR_MODEL: ${{ inputs.cursor-model }}
        CLAUDE_ENVIRONMENT_ID: ${{ inputs.claude-environment-id }}
        ADDITIONAL_CONTEXT: ${{ inputs.additional-context }}
        APPROVAL_INCLUDE: ${{ inputs.approval-include }}
        APPROVAL_DISABLE: ${{ inputs.approval-disable }}
        PR_REVIEW_SUMMARY: ${{ inputs.pr-review-summary }}
        ENFORCE_PROJECT_RULES: ${{ inputs.enforce-project-rules }}
        SIMPLIFY_SUGGEST: ${{ inputs.simplify-suggest }}
        SIMPLIFY_NEARBY_CODE: ${{ inputs.simplify-nearby-code }}
        MIN_SEVERITY: ${{ inputs.min-severity }}
        LOW_FINDINGS_CAP: ${{ inputs.low-findings-cap }}
        MAX_FINDINGS: ${{ inputs.max-findings }}
        INCLUDE_PATHS: ${{ inputs.include-paths }}
        EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}
        REVIEW_DRAFTS: ${{ inputs.review-drafts }}
        AUTHOR_ASSOCIATIONS: ${{ inputs.author-associations }}
        PR_NUMBER: ${{ inputs.pr-number }}
      # Keep Python as the step's foreground process so Actions cancellation signals reach the
      # review cleanup handler, which concludes any in-progress Approval Verdict check.
      run: PYTHONPATH="$GITHUB_ACTION_PATH/src" exec python -m code_review
